name: Validate Marketing Kit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run context diff guard
        run: python scripts/context_diff_guard.py

      - name: Run repository validator
        run: python scripts/repo_validator.py

      - name: Run unit tests
        run: pytest -q
